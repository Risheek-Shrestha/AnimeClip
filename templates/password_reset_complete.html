{% extends 'base.html' %}
{% block body %}

<section class="breadcrumb">
    <div class="container">
        <div class="breadcrumb-content">
            <ul>
                <li><a href="{% url 'index' %}">Anime</a></li>
                <li><a class="active">Password Updated</a></li>
            </ul>
        </div>
    </div>
</section>

<section class="profile sec-mar">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7 col-12">
                <div class="reset-password text-center">
                    <div style="width:72px; height:72px; background: rgba(77,255,136,0.1); border-radius: 50%; display:flex; align-items:center; justify-content:center; margin: 0 auto 20px;">
                        <i class="fas fa-check-circle" style="font-size:32px; color: #4dff88;"></i>
                    </div>
                    <h5 class="mb-3">Password Reset Successful</h5>
                    <p style="color: var(--color-dark-grey); font-size: 15px; line-height: 1.7; margin-bottom: 28px;">
                        Your password has been updated successfully. You can now log in with your new password.
                    </p>
                    <a href="{% url 'login' %}" class="anime-btn btn-dark border-change" style="padding: 12px 40px; font-size:15px; letter-spacing:1px;">
                        Go to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
