<!-- password_reset_done.html -->
{% extends 'base.html' %}
{% block body %}

<section class="breadcrumb">
    <div class="container">
        <div class="breadcrumb-content">
            <ul>
                <li><a href="{% url 'index' %}">Anime</a></li>
                <li><a class="active">Email Sent</a></li>
            </ul>
        </div>
    </div>
</section>

<section class="profile sec-mar">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7 col-12">
                <div class="reset-password text-center">
                    <div style="width:72px; height:72px; background: rgba(77,255,136,0.1); border-radius: 50%; display:flex; align-items:center; justify-content:center; margin: 0 auto 20px;">
                        <i class="fas fa-envelope" style="font-size:28px; color: #4dff88;"></i>
                    </div>
                    <h5 class="mb-3">Check Your Inbox</h5>
                    <p style="color: var(--color-dark-grey); font-size: 15px; line-height: 1.7;">
                        If an account exists with the email you entered, a password reset link has been sent. Check your spam folder if you don't see it.
                    </p>
                    <a href="{% url 'login' %}" class="anime-btn btn-dark border-change mt-4" style="padding: 10px 32px;">
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
