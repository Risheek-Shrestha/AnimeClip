{% extends 'base.html' %}
{% load static %}

{% block body %}

<section class="breadcrumb">
    <div class="container">
        <div class="breadcrumb-content">
            <ul>
                <li><a href="{% url 'index' %}">Anime</a></li>
                <li><a class="active">Reset Password</a></li>
            </ul>
        </div>
    </div>
</section>

<section class="profile sec-mar">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7 col-12">
                <div class="reset-password">
                    <div class="text-center mb-4">
                        <div style="width:64px; height:64px; background: var(--color-primary-dim); border-radius: 50%; display:flex; align-items:center; justify-content:center; margin: 0 auto 16px;">
                            <i class="fas fa-lock" style="font-size:24px; color: var(--color-primary);"></i>
                        </div>
                        <h5 class="mb-2">Reset Your Password</h5>
                        <p style="color: var(--color-dark-grey); font-size: 14px; margin: 0;">Enter your email and we'll send you a reset link.</p>
                    </div>

                    <form method="POST" class="form-validator">
                        {% csrf_token %}
                        <div class="form-group mb-4">
                            <label>Email Address</label>
                            {{ form.email }}
                        </div>
                        <button type="submit" class="anime-btn btn-dark border-change w-100" style="height:52px; font-size:15px; letter-spacing:1.2px;">
                            Send Reset Link
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="{% url 'login' %}" style="font-size:14px; color: var(--color-dark-grey);">
                            <i class="fas fa-arrow-left me-1"></i> Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
